<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volontariato in Corea del Sud 2026 — Lunaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@400;700&family=Fira+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2952;--yellow:#FFD500;--pink:#cc3366;--green:#2e7d4f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',sans-serif;}
#map{width:100%;height:520px;}
.map-tiles{filter:saturate(0.6) brightness(1.06);}
.map-titlebar{background:var(--navy);color:#fff;padding:10px 18px;font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--navy);}
.map-titlebar em{color:var(--yellow);font-style:normal;}
.map-titlebar small{font-weight:300;font-size:11px;color:#8899bb;}
.map-legend{background:#fff;padding:10px 18px;border-top:2px solid var(--yellow);display:flex;flex-wrap:wrap;gap:14px;font-family:'Fira Sans Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);}
.ld{display:flex;align-items:center;gap:7px;}
.leaflet-popup-content-wrapper{border-radius:3px;border-left:4px solid var(--navy);box-shadow:0 6px 24px rgba(0,0,0,.22);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:295px!important;}
.ph{background:var(--navy);padding:7px 14px;}
.pd{font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);display:block;}
.pb{padding:11px 14px;}
.pp{font-family:'Fira Sans Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.pr{font-size:10px;font-weight:600;color:#999;margin-bottom:5px;font-family:'Fira Sans Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.pw{font-size:10px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.pde{font-size:12px;color:#444;line-height:1.55;}
.pf{margin-top:8px;font-size:11px;font-weight:700;color:var(--navy);font-family:'Fira Sans Condensed',sans-serif;}
.pf span{color:var(--green);}
</style>
</head>
<body>
<div class="map-titlebar">
  VOLONTARIATO COREA DEL SUD — <em>&nbsp;IWO · Isola di Geomundo 2026</em>
  <small>IWO / Lunaria</small>
</div>
<div id="map" role="application" aria-label="Mappa workcamps Corea del Sud 2026"></div>
<div class="map-legend">
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#e67e22"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Arte · Cultura · Scambio (3 turni)</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#2e7d4f"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Glocal Island School (settembre)</div>
</div>

<script>
const map = L.map('map', {
  zoomControl: true,
  scrollWheelZoom: false,
  minZoom: 6, maxZoom: 13,
  attributionControl: false
}).setView([34.9, 127.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, className: 'map-tiles'
}).addTo(map);

function pin(c, multi) {
  const cols = {cult:'#e67e22', envi:'#2e7d4f'};
  const fill = cols[c] || '#0f2952';
  const dot = c === 'envi' ? '#FFD500' : '#fff';
  const id = 'p' + Math.random().toString(36).slice(2,5);
  const badge = multi ? `<circle cx="20" cy="4" r="6" fill="#0f2952"/>
    <text x="20" y="8" text-anchor="middle" font-size="7" fill="#FFD500" font-family="sans-serif" font-weight="800">3</text>` : '';
  return L.divIcon({
    className: '',
    html: `<div style="cursor:pointer;transition:transform .15s;transform-origin:bottom center"
      onmouseenter="this.style.transform='scale(1.3)'"
      onmouseleave="this.style.transform='scale(1)'">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <defs><filter id="${id}"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.3)"/></filter></defs>
        <path d="M14 2C8 2 2 7.5 2 14c0 9 12 22 12 22s12-13 12-22C26 7.5 20 2 14 2z" fill="${fill}" filter="url(#${id})"/>
        <circle cx="14" cy="14" r="5.5" fill="${dot}" opacity=".95"/>
        ${badge}
      </svg></div>`,
    iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-38]
  });
}

function pop(o) {
  const fee = o.fee ? `Fee: <span>${o.fee}</span>` : `Fee: <span>gratuita</span>`;
  return `<div class="ph"><span class="pd">${o.dates}</span></div>
  <div class="pb">
    <div class="pp">${o.place}</div>
    <div class="pr">${o.region}</div>
    <div class="pw">${o.work}</div>
    <div class="pde">${o.desc}</div>
    <div class="pf">${fee} · ${o.vols} vol · età ${o.age}</div>
  </div>`;
}

// Yeosu: punto d'imbarco per i tre turni estivi
// Piccolo offset per i tre pin sovrapposti
const yeosu = [34.7604, 127.6622];

const camps = [
  {
    lat: yeosu[0] + 0.04, lng: yeosu[1] - 0.05,
    cat: 'cult', multi: false,
    place: 'Yeosu → Isola di Geomundo (IWO-61)',
    region: 'Yeosu-si, Corea del Sud — 1° turno',
    dates: '22 giu – 1 lug',
    work: 'CULT · EDU',
    desc: 'Una notte a Yeosu, poi traghetto per Geomundo. Con artisti professionisti si creano opere usando rifiuti marini e materiali di recupero. Laboratori con studenti locali.',
    fee: null, vols: 25, age: '21+'
  },
  {
    lat: yeosu[0], lng: yeosu[1],
    cat: 'cult', multi: false,
    place: 'Yeosu → Isola di Geomundo (IWO-71)',
    region: 'Yeosu-si, Corea del Sud — 2° turno',
    dates: '10–19 luglio',
    work: 'CULT · EDU',
    desc: 'Secondo turno estivo. Stessa struttura: Yeosu la prima notte, poi l\'isola. Arte con materiali di recupero, scambio culturale con le scuole locali.',
    fee: null, vols: 25, age: '21+'
  },
  {
    lat: yeosu[0] - 0.04, lng: yeosu[1] + 0.05,
    cat: 'cult', multi: false,
    place: 'Yeosu → Isola di Geomundo (IWO-72)',
    region: 'Yeosu-si, Corea del Sud — 3° turno',
    dates: '25 lug – 3 ago',
    work: 'CULT · EDU',
    desc: 'Terzo turno estivo. Arte collettiva, rifiuti marini come materia prima, laboratori interculturali con i ragazzi dell\'isola.',
    fee: null, vols: 25, age: '21+'
  },
  {
    lat: 34.5492, lng: 127.7287,
    cat: 'envi', multi: false,
    place: 'Geumodo (IWO-91)',
    region: 'Isola di Geumodo, Yeosu-si — turno autunnale',
    dates: '8–17 settembre',
    work: 'ENVI · CULT · EDU',
    desc: 'Il Glocal Island School Project: attività didattiche con le scuole dell\'isola, workshop interculturali, esplorazione della storia insulare coreana da una prospettiva internazionale. Dimensione educativa più strutturata.',
    fee: null, vols: 25, age: '21–40'
  },
];

camps.forEach(c => {
  L.marker([c.lat, c.lng], {icon: pin(c.cat, c.multi)})
    .addTo(map)
    .bindPopup(pop(c), {maxWidth: 315});
});

// Linea traghetto Yeosu → Geomundo
const ferry = L.polyline([
  [34.76, 127.66],
  [34.55, 127.73]
], {
  color: '#0f2952',
  weight: 2,
  dashArray: '6, 6',
  opacity: 0.5
}).addTo(map);

ferry.bindTooltip('Traghetto Yeosu → Geomundo', {
  permanent: false,
  className: '',
  offset: [0, -5]
});

// Label Yeosu
L.marker([34.808, 127.620], {
  icon: L.divIcon({
    className: '',
    html: '<div style="font-family:\'Fira Sans Condensed\',sans-serif;font-size:11px;font-weight:700;color:#0f2952;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;">Yeosu</div>',
    iconSize: [60,16], iconAnchor: [30,8]
  })
}).addTo(map);
</script>
</body>
</html>
