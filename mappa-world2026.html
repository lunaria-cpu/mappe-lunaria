<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutti i Workcamps 2026 — Lunaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@400;600;700;800&family=Fira+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2952;--yellow:#FFD500;--pink:#cc3366;--green:#2e7d4f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',sans-serif;}
#map{width:100%;height:540px;}
.map-tiles{filter:saturate(0.6) brightness(1.05);}
.map-titlebar{background:var(--navy);color:#fff;padding:10px 18px;font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--yellow);}
.map-titlebar em{color:var(--yellow);font-style:normal;}
.map-titlebar small{font-weight:300;font-size:11px;color:#8899bb;}
.marker-cluster-small{background-color:rgba(15,41,82,.7)!important;}
.marker-cluster-small div{background-color:rgba(15,41,82,.9)!important;color:#FFD500!important;font-family:'Fira Sans Condensed',sans-serif;font-weight:800;}
.marker-cluster-medium{background-color:rgba(204,51,102,.7)!important;}
.marker-cluster-medium div{background-color:rgba(204,51,102,.9)!important;color:#fff!important;font-family:'Fira Sans Condensed',sans-serif;font-weight:800;}
.marker-cluster-large{background-color:rgba(255,213,0,.8)!important;}
.marker-cluster-large div{background-color:rgba(255,213,0,1)!important;color:#0f2952!important;font-family:'Fira Sans Condensed',sans-serif;font-weight:800;}
.leaflet-popup-content-wrapper{border-radius:3px;border-left:4px solid var(--navy);box-shadow:0 6px 24px rgba(0,0,0,.22);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:270px!important;}
.pu-header{background:var(--navy);padding:6px 12px;}
.pu-dates{font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);display:block;}
.pu-body{padding:10px 12px;}
.pu-name{font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;line-height:1.3;}
.pu-place{font-size:10px;font-weight:600;color:#999;margin-bottom:4px;font-family:'Fira Sans Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.pu-work{font-size:10px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.pu-desc{font-size:11px;color:#555;line-height:1.5;margin-bottom:6px;}
.pu-info{font-size:11px;color:#333;font-family:'Fira Sans Condensed',sans-serif;font-weight:700;}
.pu-info .fee{color:var(--pink);}
.map-filters{background:#f8f6f2;padding:8px 14px;border-bottom:1px solid #e5e0d8;}
.filters-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:5px;}
.filters-row:last-child{margin-bottom:0;}
.filter-label{font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#888;min-width:66px;}
.filter-btn{padding:3px 9px;border-radius:50px;border:1.5px solid #ccc;font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s;background:#fff;color:#555;white-space:nowrap;}
.filter-btn:hover{border-color:#0f2952;color:#0f2952;}
.filter-btn.active{color:#fff;border-color:currentColor;}
.f-all.active{background:var(--navy);border-color:var(--navy);color:#FFD500!important;}
.f-envi.active{background:#2e7d4f;border-color:#2e7d4f;}
.f-agri.active{background:#8e44ad;border-color:#8e44ad;}
.f-anim.active{background:#8e44ad;border-color:#8e44ad;}
.f-reno.active,.f-cons.active,.f-arch.active{background:#cc3366;border-color:#cc3366;}
.f-soci.active,.f-kids.active,.f-disa.active,.f-elde.active,.f-refu.active{background:#3498db;border-color:#3498db;}
.f-fest.active,.f-cult.active,.f-art.active{background:#e67e22;border-color:#e67e22;}
.f-edu.active,.f-stud.active,.f-lang.active{background:#16a085;border-color:#16a085;}
.f-manu.active,.f-spor.active{background:#e74c3c;border-color:#e74c3c;}
.map-count{font-family:'Fira Sans Condensed',sans-serif;font-size:10px;color:#888;margin-left:auto;padding-left:8px;white-space:nowrap;}
</style>
</head>
<body>
<div class="map-titlebar">
  WORKCAMPS STV — <em>&nbsp;MONDO 2026</em>
  <small id="total-count">caricamento...</small>
</div>
<div class="map-filters">
  <div class="filters-row">
    <span class="filter-label">Mostra</span>
    <button class="filter-btn f-all active" data-work="ALL">Tutti</button>
    <span class="map-count" id="shown-count"></span>
  </div>
  <div class="filters-row">
    <span class="filter-label">Natura</span>
    <button class="filter-btn f-envi" data-work="ENVI">Ambiente</button>
    <button class="filter-btn f-agri" data-work="AGRI">Agricoltura</button>
    <button class="filter-btn f-anim" data-work="ANIM">Animali</button>
  </div>
  <div class="filters-row">
    <span class="filter-label">Patrimonio</span>
    <button class="filter-btn f-reno" data-work="RENO">Restauro</button>
    <button class="filter-btn f-cons" data-work="CONS">Costruzione</button>
    <button class="filter-btn f-arch" data-work="ARCH">Archeologia</button>
  </div>
  <div class="filters-row">
    <span class="filter-label">Sociale</span>
    <button class="filter-btn f-soci" data-work="SOCI">Sociale</button>
    <button class="filter-btn f-kids" data-work="KIDS">Bambini</button>
    <button class="filter-btn f-disa" data-work="DISA">Disabilità</button>
    <button class="filter-btn f-elde" data-work="ELDE">Anziani</button>
    <button class="filter-btn f-refu" data-work="REFU">Rifugiati</button>
  </div>
  <div class="filters-row">
    <span class="filter-label">Cultura</span>
    <button class="filter-btn f-fest" data-work="FEST">Festival</button>
    <button class="filter-btn f-cult" data-work="CULT">Cultura</button>
    <button class="filter-btn f-art" data-work="ART">Arte</button>
  </div>
  <div class="filters-row">
    <span class="filter-label">Altro</span>
    <button class="filter-btn f-edu" data-work="EDU">Educazione</button>
    <button class="filter-btn f-stud" data-work="STUD">Studio</button>
    <button class="filter-btn f-lang" data-work="LANG">Lingua</button>
    <button class="filter-btn f-manu" data-work="MANU">Lavoro manuale</button>
    <button class="filter-btn f-spor" data-work="SPOR">Sport</button>
  </div>
</div>
<div id="map" role="application" aria-label="Mappa mondiale workcamps STV 2026"></div>

<script>
const WORK_LABELS={ENVI:'Ambiente',AGRI:'Agricoltura',ANIM:'Animali',RENO:'Restauro',CONS:'Costruzione',ARCH:'Archeologia',SOCI:'Sociale',KIDS:'Bambini',DISA:'Disabilità',ELDE:'Anziani',REFU:'Rifugiati',FEST:'Festival',CULT:'Cultura',ART:'Arte',EDU:'Educazione',STUD:'Studio',LANG:'Lingua',MANU:'Manuale',SPOR:'Sport'};

const map=L.map('map',{zoomControl:true,scrollWheelZoom:false,minZoom:2,maxZoom:14}).setView([45,15],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19,className:'map-tiles'}).addTo(map);

function workColor(works){
  if(works.includes('ENVI')||works.includes('AGRI')||works.includes('ANIM'))return'#2e7d4f';
  if(works.includes('RENO')||works.includes('CONS')||works.includes('ARCH'))return'#cc3366';
  if(works.includes('SOCI')||works.includes('KIDS')||works.includes('DISA')||works.includes('ELDE')||works.includes('REFU'))return'#3498db';
  if(works.includes('FEST')||works.includes('CULT')||works.includes('ART'))return'#e67e22';
  if(works.includes('EDU')||works.includes('STUD')||works.includes('LANG'))return'#16a085';
  if(works.includes('MANU')||works.includes('SPOR'))return'#e74c3c';
  return'#0f2952';
}

function pinIcon(color){
  const id='p'+Math.random().toString(36).slice(2,5);
  return L.divIcon({className:'',html:`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="22" viewBox="0 0 26 34"><defs><filter id="${id}"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,.35)"/></filter></defs><path d="M13 2C7 2 2 7 2 13c0 8.5 11 20 11 20s11-11.5 11-20C24 7 19 2 13 2z" fill="${color}" filter="url(#${id})"/><circle cx="13" cy="13" r="4.5" fill="rgba(255,255,255,.75)"/></svg>`,iconSize:[16,22],iconAnchor:[8,22],popupAnchor:[0,-24]});
}

function mkPopup(d){
  const fee=d.fee?`<span class="fee">${d.fee}</span>`:`<span>gratuita</span>`;
  const wl=d.works.map(w=>WORK_LABELS[w]||w).join(' · ');
  const dates=`${d.start.slice(5).replace('-','/')} → ${d.end.slice(5).replace('-','/')}`;
  return `<div class="pu-header"><span class="pu-dates">${dates}</span></div><div class="pu-body"><div class="pu-name">${d.name}</div><div class="pu-place">${d.place} — ${d.country}</div><div class="pu-work">${wl}</div>${d.desc?`<div class="pu-desc">${d.desc}</div>`:''}<div class="pu-info">Età ${d.age} · ${d.vols} vol · Fee: ${fee}</div></div>`;
}

const cluster=L.markerClusterGroup({maxClusterRadius:40,spiderfyOnMaxZoom:true,showCoverageOnHover:false,zoomToBoundsOnClick:true});
let allMarkers=[];

function buildMarkers(data){
  data.forEach(d=>{
    const m=L.marker([d.lat,d.lng],{icon:pinIcon(workColor(d.works))}).bindPopup(mkPopup(d),{maxWidth:290});
    m._works=d.works;
    allMarkers.push(m);
    cluster.addLayer(m);
  });
  map.addLayer(cluster);
  document.getElementById('total-count').textContent=data.length+' progetti · '+[...new Set(data.map(d=>d.country))].length+' paesi';
  document.getElementById('shown-count').textContent=data.length+' mostrati';
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    const work=this.dataset.work;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    cluster.clearLayers();
    const filtered=work==='ALL'?allMarkers:allMarkers.filter(m=>m._works.includes(work));
    filtered.forEach(m=>cluster.addLayer(m));
    document.getElementById('shown-count').textContent=filtered.length+' mostrati';
  });
});
</script>
<script src="pef_stv_data.js"></script>
<script>buildMarkers(PEF_DATA);</script>
</body>
</html>
