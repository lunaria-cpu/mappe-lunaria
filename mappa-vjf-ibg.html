<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volontariato Germania IBG VJF 2026 — Lunaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@400;700&family=Fira+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2952;--yellow:#FFD500;--pink:#cc3366;--green:#2e7d4f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',sans-serif;}
#map{width:100%;height:520px;}
.map-tiles{filter:saturate(0.65) brightness(1.05);}
.map-titlebar{background:var(--navy);color:#fff;padding:10px 18px;font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--navy);}
.map-titlebar em{color:var(--yellow);font-style:normal;}
.map-titlebar small{font-weight:300;font-size:11px;color:#8899bb;}
.map-legend{background:#fff;padding:10px 18px;border-top:2px solid var(--yellow);display:flex;flex-wrap:wrap;gap:14px;font-family:'Fira Sans Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);}
.ld{display:flex;align-items:center;gap:7px;}
.leaflet-popup-content-wrapper{border-radius:3px;border-left:4px solid var(--navy);box-shadow:0 6px 24px rgba(0,0,0,.22);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:278px!important;}
.ph{background:var(--navy);padding:7px 14px;}
.pd{font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);display:block;}
.pb{padding:11px 14px;}
.pp{font-family:'Fira Sans Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.pr{font-size:10px;font-weight:600;color:#999;margin-bottom:5px;font-family:'Fira Sans Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.pw{font-size:10px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.pde{font-size:12px;color:#444;line-height:1.55;}
.pf{margin-top:8px;font-size:11px;font-weight:700;color:var(--navy);font-family:'Fira Sans Condensed',sans-serif;}
.pf span{color:var(--green);}
</style>
</head>
<body>
<div class="map-titlebar">
  VOLONTARIATO GERMANIA — <em>&nbsp;IBG + VJF 2026</em>
  <small>IBG / VJF / Lunaria</small>
</div>
<div id="map"></div>
<div class="map-legend"><div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#e67e22"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Festival / Cultura</div><div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#8e44ad"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Fattoria / Animali</div><div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#cc3366"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Memoria / Patrimonio</div><div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#2e7d4f"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Ambiente / Natura</div></div>
<script>
const map=L.map('map',{zoomControl:true,scrollWheelZoom:false,minZoom:5,maxZoom:13}).setView([51.5,10.5],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19,className:'map-tiles'}).addTo(map);
function pin(c){const cols={'envi':'#2e7d4f','heri':'#cc3366','soci':'#0f2952','cult':'#e67e22','farm':'#8e44ad'};const fill=cols[c]||'#0f2952';const dot=c==='envi'?'#FFD500':c==='farm'?'#FFD500':c==='soci'?'#FFD500':'#fff';const id='p'+Math.random().toString(36).slice(2,5);return L.divIcon({className:'',html:`<div style="cursor:pointer;transition:transform .15s;transform-origin:bottom center" onmouseenter="this.style.transform='scale(1.3)'" onmouseleave="this.style.transform='scale(1)'"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><defs><filter id="${id}"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.3)"/></filter></defs><path d="M13 2C7 2 2 7 2 13c0 8.5 11 20 11 20s11-11.5 11-20C24 7 19 2 13 2z" fill="${fill}" filter="url(#${id})"/><circle cx="13" cy="13" r="5" fill="${dot}" opacity=".95"/></svg></div>`,iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-36]});}
function pop(o){const fee=o.fee?`Fee: <span>${o.fee}</span>`:`Fee: <span>gratuita</span>`;return `<div class="ph"><span class="pd">${o.dates}</span></div><div class="pb"><div class="pp">${o.place}</div><div class="pr">${o.region}</div><div class="pw">${o.work}</div><div class="pde">${o.desc}</div><div class="pf">${fee} · ${o.vols} vol · età ${o.age}</div></div>`;}
const camps=[{"lat": 49.76, "lng": 11.54, "cat": "cult", "place": "Pegnitz", "region": "Baviera", "dates": "5–13 luglio", "work": "FEST · ART · CULT", "desc": "Waldstock Music Festival: oltre vent'anni di storia, festival musicale in un piccolo villaggio. I volontari sono la struttura portante, non un complemento.", "fee": "gratuita", "vols": 10, "age": "18-26"}, {"lat": 49.53, "lng": 7.29, "cat": "cult", "place": "Freisen-Schwarzerden", "region": "Saarland", "dates": "8–22 luglio", "work": "RENO · FEST · ENVI", "desc": "Community Work and Village Festival: preparazione e realizzazione della festa tradizionale del villaggio. Tre giorni di festa comunitaria nel Saarland.", "fee": "gratuita", "vols": 12, "age": "18-60"}, {"lat": 48.78, "lng": 9.18, "cat": "cult", "place": "Stuttgart", "region": "Baden-Württemberg", "dates": "3–14 agosto", "work": "FEST · ART · MANU", "desc": "Umsonst & Draußen: il più grande festival non-commerciale di musica e politica di Stoccarda. I volontari gestiscono logistica, allestimento, accoglienza.", "fee": "gratuita", "vols": 12, "age": "18-26"}, {"lat": 49.9, "lng": 8.59, "cat": "cult", "place": "Weiterstadt", "region": "Assia", "dates": "6–21 agosto", "work": "FEST · CONS", "desc": "Outdoor Film Festival: festival cinematografico all'aperto organizzato interamente da volontari. Costruzione strutture, logistica.", "fee": "gratuita", "vols": 14, "age": "18-26"}, {"lat": 51.52, "lng": 13.22, "cat": "farm", "place": "Beeskow", "region": "Brandeburgo", "dates": "28 set – 9 ott", "work": "RENO · ANIM", "desc": "Adventure Farm Beeskow: fattoria con animali nella Brandeburgo. Manutenzione degli spazi, cura degli animali, lavori pratici in ambiente rurale.", "fee": "gratuita", "vols": 8, "age": "18-26"}, {"lat": 51.38, "lng": 11.55, "cat": "farm", "place": "Allstedt", "region": "Sassonia-Anhalt", "dates": "15–24 luglio", "work": "ANIM · ENVI", "desc": "Othal Adventure Farm: cavalli, maiali, asini, conigli, polli. Cura degli animali e restauro della scuderia. Fattoria a gestione comunitaria.", "fee": "gratuita", "vols": 6, "age": "18-26"}, {"lat": 52.76, "lng": 13.24, "cat": "envi", "place": "Wandlitz", "region": "Brandeburgo — intorno a Berlino", "dates": "6–17 luglio", "work": "ENVI · CONS", "desc": "Nature Lovers Island: lavori ambientali e di costruzione su un'isola lacustre nella Brandeburgo. Foresta, acqua, lavoro fisico.", "fee": "gratuita", "vols": 8, "age": "18-26"}, {"lat": 52.74, "lng": 12.6, "cat": "envi", "place": "Wooster Teerofen", "region": "Meclemburgo — riserva naturale", "dates": "24 ago – 4 set", "work": "ENVI · MANU", "desc": "Nature Lovers Lake and Moor: supporto ai guardaparco in una riserva naturale. Lavoro fisico nel territorio, terreno irregolare.", "fee": "gratuita", "vols": 6, "age": "18-26"}, {"lat": 52.75, "lng": 13.24, "cat": "envi", "place": "Heidesee", "region": "Brandeburgo", "dates": "4–21 settembre", "work": "RENO · MANU", "desc": "KiEZ Hölzerner See: miglioramento del centro giovanile sul lago. Costruzione, giardinaggio, manutenzione.", "fee": "gratuita", "vols": 8, "age": "18-30"}, {"lat": 52.51, "lng": 13.41, "cat": "heri", "place": "Berlino — Oranienburg", "region": "Brandeburgo", "dates": "12 lug – 2 ago · 8–22 ago", "work": "STUD · ARCH · EDU", "desc": "Never Forget Sachsenhausen (2 turni): studio del memoriale e lavori di ricerca storica. Uno dei campi più impegnativi sul piano emotivo del catalogo tedesco.", "fee": "gratuita", "vols": 8, "age": "18-30"}, {"lat": 52.52, "lng": 13.4, "cat": "heri", "place": "Berlino", "region": "Berlino", "dates": "30 mar – 11 apr · 27 apr – 9 mag", "work": "RENO · CONS", "desc": "Berlin Spring Camp (2 turni): ristrutturazione dello spazio di incontro di VJF nel cuore di Berlino. Due turni primaverili.", "fee": "gratuita", "vols": 8, "age": "18-26"}];
camps.forEach(c=>L.marker([c.lat,c.lng],{icon:pin(c.cat)}).addTo(map).bindPopup(pop(c),{maxWidth:300}));
</script>
</body>
</html>
