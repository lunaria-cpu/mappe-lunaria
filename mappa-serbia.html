<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volontariato Serbia 2026 — Lunaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@400;600;700&family=Fira+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2952;--yellow:#FFD500;--pink:#cc3366;--green:#2e7d4f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',sans-serif;}
#map{width:100%;height:560px;}
.map-tiles{filter:saturate(0.65) brightness(1.05);}
.map-titlebar{background:var(--navy);color:#fff;padding:10px 18px;font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--navy);}
.map-titlebar em{color:var(--yellow);font-style:normal;}
.map-titlebar small{font-weight:300;font-size:11px;color:#8899bb;}
.map-legend{background:#fff;padding:10px 18px;border-top:2px solid var(--yellow);display:flex;flex-wrap:wrap;gap:14px;font-family:'Fira Sans Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);}
.ld{display:flex;align-items:center;gap:7px;}
.leaflet-popup-content-wrapper{border-radius:3px;border-left:4px solid var(--navy);box-shadow:0 6px 24px rgba(0,0,0,.22);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:278px!important;}
</style>
</head>
<body>
<div class="map-titlebar">
  VOLONTARIATO SERBIA — <em>&nbsp;2026</em>
  <small>VSS / Lunaria · tutti gratuiti</small>
</div>
<div id="map"></div>
<div class="map-legend">
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#2e7d4f"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Ambiente</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#cc3366"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Archeologia / Patrimonio</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#e67e22"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Arte / Festival</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#0f2952"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Sociale / Agricoltura</div>
</div>
<script>
const map=L.map('map',{zoomControl:true,scrollWheelZoom:false,minZoom:6,maxZoom:13}).setView([44.2,20.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19,className:'map-tiles'}).addTo(map);
function pin(c){const cols={envi:'#2e7d4f',heri:'#cc3366',cult:'#e67e22',soci:'#0f2952'};const fill=cols[c]||cols.soci;const id='p'+Math.random().toString(36).slice(2,5);const dot=c==='envi'?'#FFD500':c==='soci'?'#FFD500':'#fff';return L.divIcon({className:'',html:`<div style="cursor:pointer;transition:transform .15s;transform-origin:bottom center" onmouseenter="this.style.transform='scale(1.3)'" onmouseleave="this.style.transform='scale(1)'"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><defs><filter id="${id}"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.3)"/></filter></defs><path d="M13 2C7 2 2 7 2 13c0 8.5 11 20 11 20s11-11.5 11-20C24 7 19 2 13 2z" fill="${fill}" filter="url(#${id})"/><circle cx="13" cy="13" r="5" fill="${dot}" opacity=".95"/></svg></div>`,iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-36]});}
function pop(o){return `<div style="background:#0f2952;padding:7px 14px"><span style="font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#FFD500">${o.dates}</span></div><div style="padding:11px 14px"><div style="font-family:'Fira Sans Condensed',sans-serif;font-size:15px;font-weight:700;color:#0f2952;margin-bottom:2px">${o.place}</div><div style="font-size:10px;font-weight:600;color:#999;margin-bottom:5px;font-family:'Fira Sans Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase">${o.region}</div><div style="font-size:10px;font-weight:700;color:#cc3366;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">${o.work}</div><div style="font-size:12px;color:#444;line-height:1.55">${o.desc}</div><div style="margin-top:8px;font-size:11px;font-weight:700;color:#0f2952;font-family:'Fira Sans Condensed',sans-serif">Fee: <span style="color:#2e7d4f">gratuita</span> · ${o.vols} vol · età ${o.age}</div></div>`;}
[
  {lat:45.99,lng:19.85,cat:'cult',place:"Orom",region:"Vojvodina — Serbia settentrionale",dates:"26 lug – 9 ago",work:"FEST · CONS",desc:"Malomfesztivál: festival del mulino in Vojvodina. Parcheggio, info desk, supporto tecnico durante l'evento. Grande atmosfera comunitaria.",vols:15,age:"18+"},
  {lat:20.33,lng:42.99,cat:'soci',place:"Tutuin",region:"Serbia centrale",dates:"29 ago – 10 set",work:"MANU · ART · ENVI",desc:"Outdoor Classroom: costruzione di un'aula all'aperto nel cortile del liceo. Preparazione del terreno, costruzione, pittura e abbellimento.",vols:7,age:"18+"},
  {lat:43.74,lng:20.41,cat:'soci',place:"Brezovica",region:"Šumadija — Serbia centrale",dates:"10–23 giugno",work:"RENO · AGRI · KIDS",desc:"BeeActive Camp: manutenzione dell'area del centro 'Pčelice' (Apette), orto, attività con i bambini. Lavoro fisico e vita comunitaria.",vols:12,age:"18+"},
  {lat:43.93,lng:20.72,cat:'envi',place:"Knić",region:"Šumadija — Serbia centrale",dates:"10–20 agosto",work:"ENVI",desc:"Gruža Eco Mission: rimozione di specie ittiche invasive dal lago di Gruža, manutenzione ambientale. Ecologia pratica in un paese di campagna.",vols:10,age:"18+"},
  {lat:44.74,lng:20.02,cat:'envi',place:"Kupinovo",region:"Vojvodina — riserva di Obedska Bara",dates:"16–29 agosto",work:"ENVI",desc:"Birds Eldorado: lavori ambientali nella riserva ornitologica di Obedska Bara, una delle più importanti d'Europa per gli uccelli migratori.",vols:10,age:"18+"},
  {lat:44.01,lng:21.27,cat:'envi',place:"Ribare-Jagodina",region:"Pomoravlje — Serbia centrale",dates:"6–15 luglio",work:"EDU · ENVI · CONS",desc:"Plains Globetrotters: attività educative e ambientali per sei ore al giorno nella pianura della Morava. Lavoro in squadre internazionali miste.",vols:15,age:"18+"},
  {lat:44.61,lng:20.20,cat:'cult',place:"Obrenovac",region:"Belgrado — Serbia",dates:"16–28 agosto",work:"ART · RENO",desc:"Boje Zajedništva (Colori della Comunità): murales e interventi artistici su edifici pubblici. Doppio ruolo artistico e volontario.",vols:12,age:"18+"},
  {lat:44.73,lng:20.06,cat:'heri',place:"Kupinovo",region:"Vojvodina — riserva di Obedska Bara",dates:"30 ago – 13 set · 14–27 set",work:"ARCH",desc:"Archeofun (2 turni): scavo e ricerca nel sito medievale di Kupinovo. Lavoro sul campo con archeologi professionisti.",vols:10,age:"18+"},
  {lat:44.98,lng:20.07,cat:'soci',place:"Golubinci",region:"Vojvodina — Serbia settentrionale",dates:"6–19 luglio",work:"AGRI · SOCI · MANU",desc:"Oasis Golubinci: attività agricole e comunitarie in un villaggio della pianura. Sei ore al giorno, sei giorni a settimana, principalmente all'aperto.",vols:10,age:"18-65"},
  {lat:44.84,lng:21.03,cat:'envi',place:"Deliblato",region:"Vojvodina — Sabbia di Deliblato",dates:"18–31 luglio",work:"ENVI · MANU",desc:"Stories by the Lake: attività ambientali nella riserva della Sabbia di Deliblato, area naturale unica in Europa. Lavoro e vita comunitaria.",vols:12,age:"18-65"},
  {lat:45.19,lng:20.51,cat:'heri',place:"Idvor",region:"Vojvodina — Banat",dates:"20–31 luglio",work:"RENO · EDU",desc:"School on the Wheels: restauro della casa di Mihajlo Pupin, fisico e inventore serbo-americano. Intonaco a calce, stucco, pittura a fango.",vols:10,age:"18+"},
].forEach(c=>L.marker([c.lat,c.lng],{icon:pin(c.cat)}).addTo(map).bindPopup(pop(c),{maxWidth:300}));
</script>
</body>
</html>
