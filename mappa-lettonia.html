<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volontariato Lettonia 2026 — Lunaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@400;600;700&family=Fira+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2952;--yellow:#FFD500;--pink:#cc3366;--green:#2e7d4f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',sans-serif;}
#map{width:100%;height:560px;}
.map-tiles{filter:saturate(0.65) brightness(1.05);}
.map-titlebar{background:var(--navy);color:#fff;padding:10px 18px;font-family:'Fira Sans Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--navy);}
.map-titlebar em{color:var(--yellow);font-style:normal;}
.map-titlebar small{font-weight:300;font-size:11px;color:#8899bb;}
.map-legend{background:#fff;padding:10px 18px;border-top:2px solid var(--yellow);display:flex;flex-wrap:wrap;gap:14px;font-family:'Fira Sans Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);}
.ld{display:flex;align-items:center;gap:7px;}
.leaflet-popup-content-wrapper{border-radius:3px;border-left:4px solid var(--navy);box-shadow:0 6px 24px rgba(0,0,0,.22);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:278px!important;}
</style>
</head>
<body>
<div class="map-titlebar">
  VOLONTARIATO LETTONIA — <em>&nbsp;2026</em>
  <small>Youth for Smile / Lunaria</small>
</div>
<div id="map"></div>
<div class="map-legend">
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#2e7d4f"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Ambiente / Agricoltura</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#cc3366"/><circle cx="5.5" cy="5.5" r="2.2" fill="#fff"/></svg>Patrimonio / Restauro</div>
  <div class="ld"><svg width="11" height="15" viewBox="0 0 11 15"><path d="M5.5 1C3 1 1 3 1 5.5c0 3.8 4.5 9 4.5 9s4.5-5.2 4.5-9C10 3 8 1 5.5 1z" fill="#0f2952"/><circle cx="5.5" cy="5.5" r="2.2" fill="#FFD500"/></svg>Sociale / Bambini</div>
</div>
<script>
const map=L.map('map',{zoomControl:true,scrollWheelZoom:false,minZoom:6,maxZoom:12}).setView([56.8,24.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19,className:'map-tiles'}).addTo(map);
function pin(c){const cols={envi:'#2e7d4f',heri:'#cc3366',soci:'#0f2952'};const fill=cols[c]||'#0f2952';const dot=c==='heri'?'#fff':'#FFD500';const id='p'+Math.random().toString(36).slice(2,5);return L.divIcon({className:'',html:`<div style="cursor:pointer;transition:transform .15s;transform-origin:bottom center" onmouseenter="this.style.transform='scale(1.3)'" onmouseleave="this.style.transform='scale(1)'"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><defs><filter id="${id}"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.3)"/></filter></defs><path d="M13 2C7 2 2 7 2 13c0 8.5 11 20 11 20s11-11.5 11-20C24 7 19 2 13 2z" fill="${fill}" filter="url(#${id})"/><circle cx="13" cy="13" r="5" fill="${dot}" opacity=".95"/></svg></div>`,iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-36]});}
function pop(o){return `<div style="background:#0f2952;padding:7px 14px"><span style="font-family:'Fira Sans Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#FFD500">${o.dates}</span></div><div style="padding:11px 14px"><div style="font-family:'Fira Sans Condensed',sans-serif;font-size:15px;font-weight:700;color:#0f2952;margin-bottom:2px">${o.place}</div><div style="font-size:10px;font-weight:600;color:#999;margin-bottom:5px;font-family:'Fira Sans Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase">${o.region}</div><div style="font-size:10px;font-weight:700;color:#cc3366;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">${o.work}</div><div style="font-size:12px;color:#444;line-height:1.55">${o.desc}</div><div style="margin-top:8px;font-size:11px;font-weight:700;color:#0f2952;font-family:'Fira Sans Condensed',sans-serif">Fee: <span style="color:#2e7d4f">${o.fee}</span> · ${o.vols} vol · età ${o.age}</div></div>`;}
[
  {lat:56.40,lng:25.10,cat:'heri',place:"Lauderi",region:"Vidzeme — Lettonia centrale",dates:"20 lug – 2 ago",work:"RENO · MANU · ENVI",desc:"Lauderi II: restauro dell'ex orfanotrofio per trasformarlo in un centro giovanile. Lavori di ristrutturazione, giardinaggio, manutenzione.",fee:"50 €",vols:8,age:"18-45"},
  {lat:56.55,lng:23.90,cat:'soci',place:"Bārbele",region:"Zemgale — Lettonia meridionale",dates:"27 lug – 9 ago",work:"SOCI · CULT · KIDS",desc:"Youth4Smile: lavoro di strada mobile con bambini e giovani nelle aree rurali lettoni. Animazione, attività culturali, presenza comunitaria.",fee:"50 €",vols:10,age:"18-45"},
  {lat:56.55,lng:23.90,cat:'envi',place:"Bārbele — Centro Outdoor",region:"Zemgale — Lettonia meridionale",dates:"17–25 giu · 13–26 lug",work:"ENVI · AGRI · MANU",desc:"REgenerate (2 turni): permacultura, orto biologico, cura del paesaggio nel Centro di Educazione Outdoor. Lavori pratici in un contesto rurale baltico.",fee:"50 €",vols:10,age:"18-45"},
  {lat:56.82,lng:24.08,cat:'heri',place:"Svitene",region:"Zemgale — Lettonia meridionale",dates:"20–29 lug · 8–17 ago",work:"RENO · MANU · CULT",desc:"Svitene Palace (2 turni): conservazione storica del palazzo e giardinaggio in uno dei siti del patrimonio lettone. Tecnica tradizionale, materiali autentici.",fee:"300 €",vols:15,age:"18-45"},
].forEach(c=>L.marker([c.lat,c.lng],{icon:pin(c.cat)}).addTo(map).bindPopup(pop(c),{maxWidth:300}));
</script>
</body>
</html>
